name: TikTok Affiliate Orders Sync

on:
  workflow_dispatch:
    inputs:
      seller:
        description: 'Shop cụ thể (vd "body"); để trống = tự xoay vòng 1 shop/lần; "all" = tất cả (chỉ dùng thủ công)'
        required: false
        default: ''
  # Cron đã CHUYỂN sang cron-job.org (ổn định hơn GitHub, đỡ trùng). Giữ workflow_dispatch để chạy tay khi cần.

jobs:
  sync:
    name: Sync affiliate orders + videos
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      # 1) Sync ĐƠN affiliate — nhẹ (~15s), là data chính → fatal nếu fail.
      - name: Sync affiliate orders (critical)
        env:
          EVENT_NAME: ${{ github.event_name }}
          SELLER: ${{ github.event.inputs.seller || '' }}
        run: |
          BASE="https://koc-tool.vercel.app/api/tiktok-shop/analytics"
          if [ "$EVENT_NAME" = "schedule" ] || [ -z "$SELLER" ]; then
            URL="${BASE}?action=sync_aff_orders"
          elif [ "$SELLER" = "all" ]; then
            URL="${BASE}?action=sync_aff_orders&all=1"
          else
            URL="${BASE}?action=sync_aff_orders&seller=${SELLER}"
          fi
          echo "Orders: $URL"
          RESPONSE=$(curl -sS --max-time 75 --retry 1 --retry-delay 5 "$URL")
          echo "Response: ${RESPONSE:0:600}"
          echo "$RESPONSE" | grep -q '"ok":true' || { echo "::error::Orders sync failed"; exit 1; }

      # 2) Sync VIDEO analytics (view/ngày đăng) — nặng hơn, phụ → best-effort, KHÔNG fail workflow.
      - name: Sync video analytics (best-effort)
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          SELLER: ${{ github.event.inputs.seller || '' }}
        run: |
          BASE="https://koc-tool.vercel.app/api/tiktok-shop/analytics"
          if [ "$EVENT_NAME" = "schedule" ] || [ -z "$SELLER" ]; then
            URL="${BASE}?action=sync_aff_videos"
          elif [ "$SELLER" = "all" ]; then
            URL="${BASE}?action=sync_aff_videos&all=1"
          else
            URL="${BASE}?action=sync_aff_videos&seller=${SELLER}"
          fi
          echo "Videos: $URL"
          RESPONSE=$(curl -sS --max-time 90 "$URL" || echo '{"note":"video sync timed out — non-fatal"}')
          echo "Response: ${RESPONSE:0:400}"
          echo "Video sync step done (non-fatal)."

      # 3) LẤP VIEW theo link KOC — video CÓ ĐƠN nhưng thiếu view tháng → gọi API by-id lấy đúng
      #    view (kể cả video cũ). Tự xoay 1 shop/lần (theo viewfill_last_run_at). Best-effort.
      - name: Fill KOC video views (best-effort)
        if: always()
        run: |
          BASE="https://koc-tool.vercel.app/api/tiktok-shop/analytics"
          # Lặp 5 mẻ/lần (xoay shop) → ~250 video/run, dọn backlog nhanh hơn. Best-effort, không fail.
          for n in 1 2 3 4 5; do
            R=$(curl -sS --max-time 75 "${BASE}?action=fill_koc_views&limit=50" || echo '{"note":"timeout"}')
            echo "Fill #$n: ${R:0:200}"
            sleep 2
          done
          echo "Fill views step done (non-fatal)."

      # 4) PRE-WARM cache koc_orders cho shop VỪA SYNC: hâm sẵn các range đã từng xem
      #    → user bấm vô shop là có cache liền (~3s thay vì ~10s). Best-effort, không fail.
      - name: Pre-warm KOC cache (best-effort)
        if: always()
        run: |
          BASE="https://koc-tool.vercel.app/api/tiktok-shop/analytics"
          R=$(curl -sS --max-time 90 "${BASE}?action=prewarm_koc&max=4" || echo '{"note":"prewarm timeout"}')
          echo "Prewarm: ${R:0:300}"
          echo "Prewarm step done (non-fatal)."
