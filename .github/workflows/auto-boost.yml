name: Shopee Auto Boost

on:
  workflow_dispatch:
    inputs:
      shop_id:
        description: 'Shop ID cụ thể, hoặc "all" để đẩy tất cả shop (mặc định all)'
        required: false
        default: 'all'
      force:
        description: 'Bỏ qua bộ đếm 4h, đẩy ngay? yes/no'
        required: false
        default: 'no'
  # Cron đã CHUYỂN sang cron-job.org (ổn định hơn GitHub, đỡ trùng). Giữ workflow_dispatch để chạy tay khi cần.

jobs:
  boost:
    name: Trigger recurring boost
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call auto-boost endpoint
        env:
          BOOST_CRON_SECRET: ${{ secrets.BOOST_CRON_SECRET }}
          EVENT_NAME: ${{ github.event_name }}
          SHOP_ID: ${{ github.event.inputs.shop_id || 'all' }}
          FORCE: ${{ github.event.inputs.force || 'no' }}
        run: |
          BASE="https://koc-tool.vercel.app/api/shopee/top-picks"
          FORCE_PARAM=""
          if [ "$FORCE" = "yes" ]; then FORCE_PARAM="&force=1"; fi
          # Scheduled runs always boost every enabled shop. Manual runs honor the shop_id input
          # ("all" => every enabled shop, otherwise just that one).
          if [ "$EVENT_NAME" = "schedule" ] || [ "$SHOP_ID" = "all" ]; then
            URL="${BASE}?action=auto_boost_all&source=cron${FORCE_PARAM}"
            echo "Calling auto_boost_all for ALL enabled shops (force=${FORCE})..."
          else
            URL="${BASE}?action=auto_boost&source=cron&shop_id=${SHOP_ID}${FORCE_PARAM}"
            echo "Calling auto_boost for shop ${SHOP_ID} (force=${FORCE})..."
          fi
          RESPONSE=$(curl -sS --max-time 90 --retry 2 --retry-delay 5 \
            -H "x-boost-secret: ${BOOST_CRON_SECRET}" \
            "$URL")
          echo "Response: $RESPONSE"
          # Endpoint always returns HTTP 200; treat "ok":true as success (covers ran/skipped both)
          echo "$RESPONSE" | grep -q '"ok":true' || { echo "::error::Auto-boost call failed"; exit 1; }

      # Tự TRẢ LỜI đánh giá ≥4★ cho các shop ĐÃ BẬT auto (mỗi ~15 phút). Best-effort, không fail workflow.
      - name: Auto-reply shop reviews (best-effort)
        if: always()
        env:
          BOOST_CRON_SECRET: ${{ secrets.BOOST_CRON_SECRET }}
        run: |
          BASE="https://koc-tool.vercel.app/api/shopee/top-picks"
          R=$(curl -sS --max-time 90 --retry 1 --retry-delay 5 \
            -H "x-boost-secret: ${BOOST_CRON_SECRET}" \
            "${BASE}?action=auto_reply_comments&source=cron" || echo '{"note":"auto-reply timeout"}')
          echo "Auto-reply: $R"
          echo "Auto-reply step done (non-fatal)."
