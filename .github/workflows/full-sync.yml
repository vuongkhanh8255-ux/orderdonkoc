name: TikTok Full Resync

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Từ ngày (YYYY-MM-DD, mặc định 2026-04-01)'
        required: false
        default: '2026-04-01'
      window_days:
        description: 'Kích thước mỗi chunk (ngày, mặc định 3)'
        required: false
        default: '3'
      skip_eherb_vn:
        description: 'Bỏ qua eHerb VN (token lỗi)? yes/no'
        required: false
        default: 'yes'

  schedule:
    - cron: '0 2 * * *'

jobs:
  resync:
    name: Sync TikTok Orders
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Run full resync
        env:
          TIKTOK_SHOP_APP_KEY:    ${{ secrets.TIKTOK_SHOP_APP_KEY }}
          TIKTOK_SHOP_APP_SECRET: ${{ secrets.TIKTOK_SHOP_APP_SECRET }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          FROM_DATE:    ${{ github.event.inputs.from_date || '2026-04-01' }}
          WINDOW_DAYS:  ${{ github.event.inputs.window_days || '3' }}
          SKIP_EHERB_VN: ${{ github.event.inputs.skip_eherb_vn || 'yes' }}
        run: node scripts/github-sync.mjs
