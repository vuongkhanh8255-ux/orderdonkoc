name: TikTok Full Resync

on:
  workflow_dispatch:
    inputs:
      shop_ids:
        description: 'Shop IDs cách nhau dấu phẩy (để trống = tất cả shop)'
        required: false
        default: ''
      from_date:
        description: 'Từ ngày (YYYY-MM-DD, mặc định 2026-04-01)'
        required: false
        default: '2026-04-01'
      window_days:
        description: 'Kích thước mỗi chunk (ngày, mặc định 3)'
        required: false
        default: '3'

  schedule:
    - cron: '0 2 * * *'

jobs:
  resync:
    name: Sync TikTok Orders
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Run full resync
        env:
          SHOP_IDS:    ${{ github.event.inputs.shop_ids }}
          FROM_DATE:   ${{ github.event.inputs.from_date || '2026-04-01' }}
          WINDOW_DAYS: ${{ github.event.inputs.window_days || '3' }}
        run: |
          BASE_URL="https://koc-tool.vercel.app/api/tiktok-shop/sync-orders"

          FROM_TS=$(date -d "$FROM_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$FROM_DATE" +%s)
          NOW=$(date +%s)
          WINDOW_SEC=$(( ${WINDOW_DAYS:-3} * 24 * 3600 ))

          echo "============================================"
          echo "FROM : $FROM_DATE ($FROM_TS)"
          echo "NOW  : $(date -u -d @$NOW +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -r $NOW +%Y-%m-%dT%H:%M:%SZ)"
          echo "CHUNK: ${WINDOW_DAYS:-3} ngày"
          echo "SHOPS: ${SHOP_IDS:-tất cả}"
          echo "============================================"

          total_synced=0
          total_errors=0
          chunk=0

          call_chunk() {
            local url="$1"
            local label="$2"
            echo -n "  $label ... "
            resp=$(curl -s -m 60 -X POST "$url" -H "Content-Type: application/json" 2>/dev/null)
            if echo "$resp" | grep -q '"success":true'; then
              synced=$(echo "$resp" | grep -o '"totalSynced":[0-9]*' | head -1 | grep -o '[0-9]*')
              synced=${synced:-0}
              echo "✅ ${synced} đơn"
              echo "$synced"   # return value
            else
              echo "❌ lỗi"
              echo "$resp" | cut -c1-200
              echo "-1"   # signal error
            fi
          }

          t=$FROM_TS
          while [ "$t" -lt "$NOW" ]; do
            lt=$(( t + WINDOW_SEC ))
            [ "$lt" -gt "$NOW" ] && lt=$NOW

            from_fmt=$(date -u -d @$t +%d/%m 2>/dev/null || date -u -r $t +%d/%m)
            lt_fmt=$(date -u -d @$lt +%d/%m 2>/dev/null || date -u -r $lt +%d/%m)
            chunk=$(( chunk + 1 ))
            echo ""
            echo "── Chunk $chunk: $from_fmt → $lt_fmt ──"

            PARAMS="full=true&from_ts=${t}&to_ts=${lt}"

            if [ -n "$SHOP_IDS" ]; then
              IFS=',' read -ra SHOPS <<< "$SHOP_IDS"
              for shop_id in "${SHOPS[@]}"; do
                shop_id=$(echo "$shop_id" | xargs)
                [ -z "$shop_id" ] && continue
                result=$(call_chunk "${BASE_URL}?${PARAMS}&shop_id=${shop_id}" "shop $shop_id")
                last_line=$(echo "$result" | tail -1)
                if [ "$last_line" = "-1" ]; then
                  total_errors=$(( total_errors + 1 ))
                else
                  num=$(echo "$last_line" | tr -cd '0-9')
                  total_synced=$(( total_synced + ${num:-0} ))
                fi
              done
            else
              result=$(call_chunk "${BASE_URL}?${PARAMS}" "tất cả shops")
              last_line=$(echo "$result" | tail -1)
              if [ "$last_line" = "-1" ]; then
                total_errors=$(( total_errors + 1 ))
              else
                num=$(echo "$last_line" | tr -cd '0-9')
                total_synced=$(( total_synced + ${num:-0} ))
              fi
            fi

            t=$lt
            sleep 1
          done

          echo ""
          echo "============================================"
          echo "HOÀN THÀNH"
          echo "Tổng đơn đã sync : $total_synced"
          echo "Số chunk lỗi     : $total_errors"
          echo "Tổng chunks      : $chunk"
          echo "============================================"

          [ "$total_errors" -gt 0 ] && exit 1 || exit 0
