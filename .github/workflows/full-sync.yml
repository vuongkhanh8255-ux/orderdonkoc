name: TikTok Full Resync

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Từ ngày (YYYY-MM-DD, mặc định 2026-04-01)'
        required: false
        default: '2026-04-01'
      window_days:
        description: 'Kích thước mỗi chunk (ngày, mặc định 3)'
        required: false
        default: '3'
      skip_eherb_vn:
        description: 'Bỏ qua eHerb VN (token lỗi)? yes/no'
        required: false
        default: 'yes'

  schedule:
    - cron: '0 2 * * *'

jobs:
  resync:
    name: Sync TikTok Orders
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Run full resync
        env:
          FROM_DATE:      ${{ github.event.inputs.from_date || '2026-04-01' }}
          WINDOW_DAYS:    ${{ github.event.inputs.window_days || '3' }}
          SKIP_EHERB_VN: ${{ github.event.inputs.skip_eherb_vn || 'yes' }}
        run: |
          set +e   # đừng chết khi có lỗi từng bước
          BASE_URL="https://koc-tool.vercel.app/api/tiktok-shop/sync-orders"

          # ── Danh sách shop (hardcoded từ Supabase) ──────────────────
          # Format: "shop_id|Tên shop"
          SHOPS=(
            "7495107349171898427|Body Miss"
            "7495838925500090511|eHerb HCM"
            "7494813818973817115|Milaganics VN"
            "7495831977917385095|Moaw Moaws VN"
          )
          # eHerb VN token đang lỗi — thêm lại khi đã fix
          if [ "$SKIP_EHERB_VN" != "yes" ]; then
            SHOPS+=("7494529979361168222|eHerb VN")
          fi

          FROM_TS=$(date -d "$FROM_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$FROM_DATE" +%s)
          NOW=$(date +%s)
          WINDOW_SEC=$(( ${WINDOW_DAYS:-3} * 24 * 3600 ))

          echo "============================================"
          echo "FROM : $FROM_DATE ($FROM_TS)"
          echo "NOW  : $(date -u -d @$NOW +%Y-%m-%dT%H:%M:%SZ 2>/dev/null)"
          echo "CHUNK: ${WINDOW_DAYS:-3} ngày"
          echo "SHOPS: ${#SHOPS[@]} shop(s)"
          echo "============================================"

          total_synced=0
          total_errors=0
          chunk=0

          t=$FROM_TS
          while [ "$t" -lt "$NOW" ]; do
            lt=$(( t + WINDOW_SEC ))
            [ "$lt" -gt "$NOW" ] && lt=$NOW

            from_fmt=$(date -u -d @$t +%d/%m)
            lt_fmt=$(date -u -d @$lt +%d/%m)
            chunk=$(( chunk + 1 ))
            echo ""
            echo "── Chunk $chunk: $from_fmt → $lt_fmt ──"

            for entry in "${SHOPS[@]}"; do
              shop_id="${entry%%|*}"
              shop_name="${entry##*|}"

              printf "  %-18s " "$shop_name"

              resp=$(curl -s -m 60 -X POST \
                "${BASE_URL}?full=true&from_ts=${t}&to_ts=${lt}&shop_id=${shop_id}" \
                -H "Content-Type: application/json" 2>/dev/null) || resp=""

              if [ -z "$resp" ]; then
                echo "❌ no response (curl timeout/error)"
                total_errors=$(( total_errors + 1 ))
              elif echo "$resp" | grep -q '"success":true'; then
                synced=$(echo "$resp" | grep -o '"totalSynced":[0-9]*' | head -1 | grep -o '[0-9]*')
                synced=${synced:-0}
                echo "✅ $synced đơn"
                total_synced=$(( total_synced + synced ))
              else
                err=$(echo "$resp" | grep -o '"error":"[^"]*"' | head -1)
                echo "❌ $err  |  $(echo "$resp" | cut -c1-120)"
                total_errors=$(( total_errors + 1 ))
              fi
            done

            t=$lt
            sleep 1
          done

          echo ""
          echo "============================================"
          echo "HOÀN THÀNH"
          echo "Tổng đơn đã sync : $total_synced"
          echo "Số chunk lỗi     : $total_errors"
          echo "Tổng chunks      : $chunk"
          echo "============================================"

          [ "$total_errors" -gt 0 ] && exit 1 || exit 0
