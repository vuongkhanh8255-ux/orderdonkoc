<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stella Kinetics Dashboard</title>
    <style>
      /* ── Màn hình loading lúc web khởi động (runner cam) — by Uiverse anand_4957 ── */
      #app-loading { position: fixed; inset: 0; background: #f6f7f9; z-index: 99999; overflow: hidden; }
      #app-loading .loader {
        position: absolute; top: 50%; margin-left: -50px; left: 50%;
        animation: rl-speeder 0.4s linear infinite;
      }
      #app-loading .loader > span {
        height: 5px; width: 35px; background: #ff6a2c; position: absolute;
        top: -19px; left: 60px; border-radius: 2px 10px 1px 0;
      }
      #app-loading .base span {
        position: absolute; width: 0; height: 0;
        border-top: 6px solid transparent; border-right: 100px solid #ff6a2c; border-bottom: 6px solid transparent;
      }
      #app-loading .base span:before {
        content: ""; height: 22px; width: 22px; border-radius: 50%; background: #ff6a2c;
        position: absolute; right: -110px; top: -16px;
      }
      #app-loading .base span:after {
        content: ""; position: absolute; width: 0; height: 0;
        border-top: 0 solid transparent; border-right: 55px solid #ff6a2c; border-bottom: 16px solid transparent;
        top: -16px; right: -98px;
      }
      #app-loading .face {
        position: absolute; height: 12px; width: 20px; background: #ff6a2c;
        border-radius: 20px 20px 0 0; transform: rotate(-40deg); right: -125px; top: -15px;
      }
      #app-loading .face:after {
        content: ""; height: 12px; width: 12px; background: #ff6a2c; right: 4px; top: 7px;
        position: absolute; transform: rotate(40deg); transform-origin: 50% 50%; border-radius: 0 0 0 2px;
      }
      #app-loading .loader > span > span:nth-child(1),
      #app-loading .loader > span > span:nth-child(2),
      #app-loading .loader > span > span:nth-child(3),
      #app-loading .loader > span > span:nth-child(4) {
        width: 30px; height: 1px; background: #ff6a2c; position: absolute; animation: rl-fazer1 0.2s linear infinite;
      }
      #app-loading .loader > span > span:nth-child(2) { top: 3px; animation: rl-fazer2 0.4s linear infinite; }
      #app-loading .loader > span > span:nth-child(3) { top: 1px; animation: rl-fazer3 0.4s linear infinite; animation-delay: -1s; }
      #app-loading .loader > span > span:nth-child(4) { top: 4px; animation: rl-fazer4 1s linear infinite; animation-delay: -1s; }
      @keyframes rl-fazer1 { 0% { left: 0; } 100% { left: -80px; opacity: 0; } }
      @keyframes rl-fazer2 { 0% { left: 0; } 100% { left: -100px; opacity: 0; } }
      @keyframes rl-fazer3 { 0% { left: 0; } 100% { left: -50px; opacity: 0; } }
      @keyframes rl-fazer4 { 0% { left: 0; } 100% { left: -150px; opacity: 0; } }
      @keyframes rl-speeder {
        0% { transform: translate(2px, 1px) rotate(0deg); }
        10% { transform: translate(-1px, -3px) rotate(-1deg); }
        20% { transform: translate(-2px, 0px) rotate(1deg); }
        30% { transform: translate(1px, 2px) rotate(0deg); }
        40% { transform: translate(1px, -1px) rotate(1deg); }
        50% { transform: translate(-1px, 3px) rotate(-1deg); }
        60% { transform: translate(-1px, 1px) rotate(0deg); }
        70% { transform: translate(3px, 1px) rotate(-1deg); }
        80% { transform: translate(-2px, -1px) rotate(1deg); }
        90% { transform: translate(2px, 1px) rotate(0deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
      }
      #app-loading .longfazers { position: absolute; width: 100%; height: 100%; }
      #app-loading .longfazers span { position: absolute; height: 2px; width: 20%; background: #ff6a2c; }
      #app-loading .longfazers span:nth-child(1) { top: 20%; animation: rl-lf 0.6s linear infinite; animation-delay: -5s; }
      #app-loading .longfazers span:nth-child(2) { top: 40%; animation: rl-lf2 0.8s linear infinite; animation-delay: -1s; }
      #app-loading .longfazers span:nth-child(3) { top: 60%; animation: rl-lf3 0.6s linear infinite; }
      #app-loading .longfazers span:nth-child(4) { top: 80%; animation: rl-lf4 0.5s linear infinite; animation-delay: -3s; }
      @keyframes rl-lf  { 0% { left: 200%; } 100% { left: -200%; opacity: 0; } }
      @keyframes rl-lf2 { 0% { left: 200%; } 100% { left: -200%; opacity: 0; } }
      @keyframes rl-lf3 { 0% { left: 200%; } 100% { left: -100%; opacity: 0; } }
      @keyframes rl-lf4 { 0% { left: 200%; } 100% { left: -100%; opacity: 0; } }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading splash: tự biến mất khi React render xong -->
      <div id="app-loading">
        <div class="loader">
          <span><span></span><span></span><span></span><span></span></span>
          <div class="base">
            <span></span>
            <div class="face"></div>
          </div>
        </div>
        <div class="longfazers">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
